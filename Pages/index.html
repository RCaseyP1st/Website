<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toolbar Example</title>
    <link rel="stylesheet" href="../Style/headerstyle.css">
    <link rel="stylesheet" href="../Style/herostyle.css">
    <link href="https://db.onlinewebfonts.com/c/05bc9865d1c175deb11bcc23c7b96289?family=Sana+Sans+Alt+Book" rel="stylesheet">
</head>
<body>
    <div class="header">
        <div class="left-toolbar">
            <a href="/">
                <img src="../Images/p1Logo.png" alt="Parents 1st Logo" class="header-logo">
            </a>
            <span class="activities">
                <span class="toolbar-numbers">122</span> <a href="https://parents1st.org.uk/activities">Activities</a>
            </span>
            <span class="members">
                <span class="toolbar-numbers">837</span> <a href="https://parents1st.org.uk/members">Members</a>
            </span>
            <a href="https://parents1st.org.uk/help" class="help-link">Help</a>
        </div>
        <!-- Centered Search Bar -->
        <div class="center-toolbar">
            <form action="" method="get">
                <input type="text" name="query" class="search-input" placeholder="Search this site...">
                <button type="submit" class="search-button">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Magnifying_glass_icon.svg" alt="Search">
                </button>
            </form>
        </div>
        <!-- Right Toolbar with Crisis Button -->
        <div class="right-toolbar">
            <a href="#" class="crisis-button">
                <div class="exclamation-triangle">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10.29 3.86L1.82 19a1 1 0 0 0 .89 1.5h18.38a1 1 0 0 0 .89-1.5L13.71 3.86a1 1 0 0 0-1.82 0z"></path>
                        <line x1="12" y1="9" x2="12" y2="13"></line>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                </div>
                <span>IN CRISIS?</span>
            </a>
        </div>
    </div>
</body>
</html>
